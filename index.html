<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Hub Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
header{
    padding:20px;
    text-align:center;
    background:#111827;
    font-size:22px;
    font-weight:bold;
}

/* CONTAINER */
.container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    padding:20px;
    flex-wrap:wrap;
}

/* CARD */
.card{
    width:280px;
    height:220px;
    background:#1e293b;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.card:hover{
    transform:translateY(-8px);
    background:#334155;
}

.card h2{
    margin-bottom:10px;
}

.card p{
    text-align:center;
    font-size:14px;
    opacity:0.8;
    padding:0 10px;
}

/* ICON STYLE */
.icon{
    font-size:50px;
    margin-bottom:15px;
}

/* COLORS */
.html{
    border-top:4px solid #f97316;
}

.css{
    border-top:4px solid #3b82f6;
}

/* FOOTER */
footer{
    text-align:center;
    padding:10px;
    background:#111827;
    font-size:12px;
    opacity:0.7;
}
</style>

</head>

<body>

<header>
    🚀 Learning Dashboard Hub
</header>

<div class="container">

    <!-- HTML CARD -->
    <div class="card html" onclick="openPage('Html_Main.html')">
        <div class="icon">📘</div>
        <h2>HTML Learning</h2>
        <p>Learn HTML basics, tags, tables, forms, and structure</p>
    </div>

    <!-- CSS CARD -->
    <div class="card css" onclick="openPage('/css/Css_Main.html')">
        <div class="icon">🎨</div>
        <h2>CSS Learning</h2>
        <p>Learn styling, layouts, flexbox, grid, and responsive design</p>
    </div>

</div>

<footer>
    Built for students learning web development 🚀
</footer>

<script>
function openPage(page){
    window.location.href = page;
}
</script>

</body>
</html>
