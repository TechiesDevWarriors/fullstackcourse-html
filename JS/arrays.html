<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Arrays</title>
    <link rel="stylesheet" href="arrays.css">
</head>
<body>

    <div class="container">
        <h1>JavaScript Arrays</h1>

        <p>
            An array is used to store multiple values in a single variable.
            In this example, we will perform common array operations.
        </p>

        <button onclick="showArray()">Show Array</button>
        <button onclick="showFirstFruit()">First Element</button>
        <button onclick="showLength()">Array Length</button>
        <button onclick="addFruit()">Push Element</button>
        <button onclick="removeFruit()">Pop Element</button>

        <h2>Output</h2>
        <div id="output"></div>
    </div>

    <script src="arrays.js"></script>

</body>
</html>
