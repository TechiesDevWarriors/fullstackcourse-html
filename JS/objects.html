<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Objects</title>
    <link rel="stylesheet" href="objects.css">
</head>
<body>

    <div class="container">
        <h1>JavaScript Objects</h1>

        <p>
            An object stores related information as <strong>key-value pairs</strong>.
            In this example, we'll create a student object and perform common operations.
        </p>

        <button onclick="showObject()">Show Object</button>
        <button onclick="showName()">Access Property</button>
        <button onclick="addProperty()">Add Property</button>
        <button onclick="updateProperty()">Update Property</button>

        <h2>Output</h2>
        <div id="output"></div>
    </div>

    <script src="objects.js"></script>

</body>
</html>
