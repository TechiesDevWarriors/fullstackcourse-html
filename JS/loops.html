<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Loops</title>
    <link rel="stylesheet" href="loops.css">
</head>
<body>

    <div class="container">
        <h1>JavaScript Loops</h1>

        <p>
            Loops allow you to execute the same block of code multiple times.
            Click the buttons below to see different loop examples.
        </p>

        <button onclick="showForLoop()">For Loop</button>
        <button onclick="showWhileLoop()">While Loop</button>
        <button onclick="showDoWhileLoop()">Do...While Loop</button>
        <button onclick="showForOfLoop()">For...Of Loop</button>

        <h2>Output</h2>
        <pre id="output"></pre>
    </div>

    <script src="loops.js"></script>

</body>
</html>
