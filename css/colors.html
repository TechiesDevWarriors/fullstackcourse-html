<!DOCTYPE html>
<html>
<head>
<style>

body{
    font-family:Arial;
    text-align:center;
}

.rgb{
    background:rgb(255,0,0);
    color:white;
    padding:20px;
}

.hex{
    background:#00b894;
    color:white;
    padding:20px;
}

.name{
    background:gold;
    padding:20px;
}

.hsl{
    background:hsl(250,80%,60%);
    color:white;
    padding:20px;
}

div{
    margin:20px;
    border-radius:10px;
}

</style>
</head>

<body>

<h1>Different Ways to Use Colors</h1>

<div class="rgb">RGB Color</div>

<div class="hex">HEX Color</div>

<div class="name">Named Color</div>

<div class="hsl">HSL Color</div>

</body>
</html>
