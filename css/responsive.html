<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design Demo</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f4f4f4;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            margin-bottom: 30px;
            color: #555;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .card {
            flex: 1;
            padding: 40px;
            background: skyblue;
            text-align: center;
            border-radius: 10px;
            font-size: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        /* Mobile View */
        @media (max-width: 768px) {

            .container {
                flex-direction: column;
            }

            .card {
                background: lightgreen;
            }
        }

        .btn-container {
            text-align: center;
            margin-top: 40px;
        }

        button {
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

    <h1>Responsive Design Demo</h1>

    <p>Resize the browser window to see the layout change.</p>

    <div class="container">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
    </div>

   <div class="btn-container" id="previewButton"> <button onclick="openPreview()"> Open Full Screen Preview </button> </div>

    <script> 
    function openPreview() { 
        // Open the page in a new tab
         window.open(window.location.href + "?preview=true", "_blank"); 
        } 
         // Hide the button when the page is opened in preview mode 
         const params = new URLSearchParams(window.location.search); 
         if (params.get("preview") === "true") { 
            document.getElementById("previewButton").style.display = "none"; 
        } 
    </script>

</body>
</html>
