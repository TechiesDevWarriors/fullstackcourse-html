<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Shopping Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

/* Header */
header{
    background:#1e3a8a;
    color:white;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

nav{
    display:flex;
    gap:20px;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

/* Hero */
.hero{
    background:linear-gradient(to right,#2563eb,#38bdf8);
    color:white;
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-size:40px;
    margin-bottom:15px;
}

.hero p{
    font-size:18px;
    margin-bottom:20px;
}

.hero button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:white;
    color:#2563eb;
    font-size:16px;
    font-weight:bold;
}

/* Products */
.products{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    border-radius:10px;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    border-radius:8px;
    margin-bottom:15px;
}

.price{
    color:green;
    font-size:20px;
    margin:10px 0;
    font-weight:bold;
}

.card button{
    padding:10px 18px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* Preview Button */
.preview{
    text-align:center;
    padding:30px;
}

.preview button{
    padding:12px 24px;
    font-size:17px;
    border:none;
    background:#16a34a;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

/* Responsive */
@media(max-width:768px){

    header{
        flex-direction:column;
        gap:15px;
    }

    nav{
        flex-direction:column;
        align-items:center;
    }

    .hero h1{
        font-size:30px;
    }

    .products{
        grid-template-columns:1fr;
    }
}
</style>

</head>

<body>

<header>
    <h2>ShopEasy</h2>

    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Offers</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Summer Sale 50% OFF</h1>
    <p>Resize your browser to see the responsive layout in action.</p>
    <button>Shop Now</button>
</section>

<section class="products">

    <div class="card">
        <img src="https://picsum.photos/300/200?1" alt="">
        <h3>Wireless Headphones</h3>
        <div class="price">$79</div>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?2" alt="">
        <h3>Smart Watch</h3>
        <div class="price">$149</div>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?3" alt="">
        <h3>Bluetooth Speaker</h3>
        <div class="price">$59</div>
        <button>Add to Cart</button>
    </div>

</section>

<div class="preview" id="previewButton">
    <button onclick="openPreview()">Open Full Screen Preview</button>
</div>

<script>
function openPreview() {
    window.open(window.location.href + "?preview=true", "_blank");
}

const params = new URLSearchParams(window.location.search);

if (params.get("preview") === "true") {
    document.getElementById("previewButton").style.display = "none";
}
</script>

</body>
</html>
