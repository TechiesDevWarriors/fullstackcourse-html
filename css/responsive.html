<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    font-family:Arial;
}

.container{
    display:flex;
    gap:20px;
}

.card{
    flex:1;
    padding:40px;
    background:skyblue;
    text-align:center;
    border-radius:10px;
    font-size:25px;
}

/* Mobile View */
@media(max-width:768px){

    .container{
        flex-direction:column;
    }

    .card{
        background:lightgreen;
    }

}

</style>

</head>

<body>

<h1 align="center">Responsive Design Demo</h1>

<p align="center">
Resize the browser window to see the layout change.
</p>

<div class="container">

    <div class="card">Card 1</div>

    <div class="card">Card 2</div>

    <div class="card">Card 3</div>

</div>

</body>
</html>
