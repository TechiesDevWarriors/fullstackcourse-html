<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors Demo</title>

    <style>
        /* Element Selector */
        h2 {
            color: blue;
        }

        /* Class Selector */
        .student {
            color: green;
            font-size: 22px;
        }

        /* ID Selector */
        #special {
            background: yellow;
            padding: 10px;
        }

        /* Universal Selector */
        * {
            font-family: Arial;
        }

        /* Group Selector */
        h3, p {
            border-left: 5px solid red;
            padding-left: 10px;
        }

        /* Hover Selector */
        button:hover {
            background: orange;
            color: white;
        }
    </style>

</head>

<body>

<h1>CSS Selectors Demo</h1>

<h2>Element Selector (h2)</h2>

<p class="student">Class Selector (.student)</p>

<p id="special">ID Selector (#special)</p>

<h3>Group Selector Example</h3>

<p>This paragraph is styled using a group selector.</p>

<button>Hover Me</button>

</body>
</html>
