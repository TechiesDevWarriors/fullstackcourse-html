<!DOCTYPE html>
<html>
<head>
<style>

.box{
    width:300px;
    height:150px;
    background:skyblue;

    color:darkblue;
    font-size:24px;

    border:4px solid blue;
    border-radius:15px;

    margin:30px auto;
    padding:20px;

    text-align:center;

    transition:0.5s;
}

.box:hover{
    transform:scale(1.1) rotate(2deg);
}

</style>
</head>

<body>

<h1 align="center">CSS Properties Demo</h1>

<div class="box">
    Hover Over Me!
</div>

</body>
</html>
